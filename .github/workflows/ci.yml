name: CI

# Gate merges: install, type-check, run test suite, and build all apps.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build main POS app
        run: npm run build

      - name: Build customer web app
        run: npm run customer:build

      - name: Build driver web app
        run: npm run driver:build

