version: '3.8'

services:
  gastroflow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastroflow_saas_suite
    restart: always
    ports:
      - "5000:5000"
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-super_secret_restaurant_pos_key_2026}
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID:-1237073}
      - PAYHERE_SECRET=${PAYHERE_SECRET:-4OcPJrUbZxs8n4V8nHXf1R4Dztrwo2foI8WA9bDyfYgP}
      - PAYHERE_SANDBOX=${PAYHERE_SANDBOX:-true}
    volumes:
      - gastroflow_data:/app/data

  nginx-proxy:
    image: nginx:alpine
    container_name: gastroflow_nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gastroflow-app

volumes:
  gastroflow_data:
