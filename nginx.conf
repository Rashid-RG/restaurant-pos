# GastroFlow SaaS Suite — Production Nginx SSL Reverse Proxy Configuration

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream Services (Docker Internal Networking)
    upstream pos_app {
        server gastroflow-app:3000;
    }

    upstream food_app {
        server gastroflow-app:3001;
    }

    upstream driver_app {
        server gastroflow-app:3002;
    }

    upstream backend_api {
        server gastroflow-app:5000;
    }

    # 1. GastroPOS Terminal — pos.gastroflow.lk
    server {
        listen 80;
        server_name pos.gastroflow.lk pos.yourdomain.com;

        location / {
            proxy_pass http://pos_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. GastroFood Customer Marketplace — food.gastroflow.lk
    server {
        listen 80;
        server_name food.gastroflow.lk food.yourdomain.com;

        location / {
            proxy_pass http://food_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. GastroDriver Rider App — driver.gastroflow.lk
    server {
        listen 80;
        server_name driver.gastroflow.lk driver.yourdomain.com;

        location / {
            proxy_pass http://driver_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 4. Backend API & Webhooks — api.gastroflow.lk
    server {
        listen 80;
        server_name api.gastroflow.lk api.yourdomain.com;

        # WebSocket / Server-Sent Events (SSE) support for real-time order tracking
        location /api/stream/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
