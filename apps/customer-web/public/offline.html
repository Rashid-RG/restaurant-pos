<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GastroFlow — Offline</title>
  <style>
    :root { --brand: #ff6b35; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; background: #f8f9fa; color: #1a1a2e;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #555775; font-size: 0.95rem; max-width: 320px; line-height: 1.5; }
    button {
      margin-top: 24px; padding: 13px 28px; min-height: 44px;
      background: var(--brand); color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f0f17; color: #f1f3f5; }
      p { color: #9499b3; }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>We can't reach GastroFlow right now. Check your connection — your cart is saved and will be here when you're back.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
